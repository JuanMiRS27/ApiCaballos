steps:
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE}", "."]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --add-cloudsql-instances
      - ${_INSTANCE_CONNECTION_NAME}
      - --set-env-vars
      - SPRING_PROFILES_ACTIVE=gcp,DB_NAME=${_DB_NAME},INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},SPRING_DATASOURCE_USERNAME=${_DB_USER},SPRING_DATASOURCE_PASSWORD=${_DB_PASSWORD},APP_JWT_SECRET=${_JWT_SECRET},APP_ADMIN_USERNAME=${_ADMIN_USERNAME},APP_ADMIN_PASSWORD=${_ADMIN_PASSWORD},APP_ADMIN_EMAIL=${_ADMIN_EMAIL}

images:
  - ${_IMAGE}

substitutions:
  _SERVICE_NAME: carreras-api
  _REGION: us-central1
  _DB_NAME: carreras_db
  _DB_USER: root
  _DB_PASSWORD: change-me
  _INSTANCE_CONNECTION_NAME: your-project:us-central1:carreras-mysql
  _JWT_SECRET: ZXN0YS1lcy11bmEtY2xhdmUtZGUtbWFzLWRlLTMyLWJ5dGVzLXBhcmEtand0
  _ADMIN_USERNAME: admin
  _ADMIN_PASSWORD: Admin123*
  _ADMIN_EMAIL: admin@carreras.local
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/carreras-api/api-sencilla:latest
