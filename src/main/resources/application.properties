spring.application.name=ApiSencilla
server.port=${PORT:8080}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.datasource.hikari.initialization-fail-timeout=60000

app.jwt.secret=${APP_JWT_SECRET:ZXN0YS1lcy11bmEtY2xhdmUtZGUtbWFzLWRlLTMyLWJ5dGVzLXBhcmEtand0}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:Admin123*}
app.admin.email=${APP_ADMIN_EMAIL:admin@carreras.local}
